# Orbit — bring the whole system up with `docker compose up -d --build`.
#
#   orbit      backend + dashboard (only 6801 is exposed)
#   lightpanda the agent browser, reached internally at ws://lightpanda:9222
#
# The `pi` CLI is bind-mounted from the host (see the `volumes` note). Copy
# .env.example → .env first and set your LLM creds + ORBIT_SUPERADMIN_* there.
#
# PROD (default):  docker compose up -d --build
# DEV  (HMR):      docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build

services:
  orbit:
    build:
      context: .
      target: runtime          # prod image (built .next, deps pruned). Dev override flips this.
    image: orbit:latest
    restart: unless-stopped
    ports:
      - "6801:6801"            # dashboard (UI + proxies /api and /api/ws to the backend)
      # Backend API/WS. Only needed if an EXTERNAL nginx proxies /api straight to
      # :6800 (the bare-metal layout). Requires HOST=0.0.0.0 (backend binds all
      # interfaces) + ORBIT_SUPERADMIN_KEY set; firewall this port to the proxy
      # host. If nginx instead sends /api to :6801, you can remove this line.
      - "6800:6800"
    env_file:
      - .env
    environment:
      # Reach the sibling browser service (overrides the .env / default).
      LIGHTPANDA_WS: "ws://lightpanda:9222"
      # Persist the SQLite DB + session workspaces on the named volume below.
      ORBIT_DB_PATH: "/data/orbit.db"
      ORBIT_HOME: "/data/orbit-home"
      # pi (@earendil-works/pi-coding-agent) is baked into the image and on PATH,
      # so no PI_CLI_PATH / host mount is needed. PORT/HOST are forced per-process
      # by the entrypoint (backend :6800, dashboard :6801) — don't set them here.
    volumes:
      - orbit-data:/data
    depends_on:
      - lightpanda

  lightpanda:
    image: lightpanda/browser:nightly
    restart: unless-stopped
    expose:
      - "9222"                 # internal only; orbit connects via LIGHTPANDA_WS

volumes:
  orbit-data:
