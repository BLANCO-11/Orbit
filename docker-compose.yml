# Orbit — bring the whole system up with `docker compose up -d --build`.
#
#   orbit      backend + dashboard (only 6801 is exposed)
#   lightpanda the agent browser, reached internally at ws://lightpanda:9222
#
# The `pi` CLI is bind-mounted from the host (see the `volumes` note). Copy
# .env.example → .env first and set your LLM creds + ORBIT_SUPERADMIN_* there.
#
# PROD (default):  docker compose up -d --build
# DEV  (HMR):      docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build

services:
  orbit:
    build:
      context: .
      target: runtime          # prod image (built .next, deps pruned). Dev override flips this.
    image: orbit:latest
    restart: unless-stopped
    ports:
      - "6801:6801"            # dashboard (UI + proxies /api and /api/ws to the backend)
      # Backend API/WS. Only needed if an EXTERNAL nginx proxies /api straight to
      # :6800 (the bare-metal layout). Requires HOST=0.0.0.0 (backend binds all
      # interfaces) + ORBIT_SUPERADMIN_KEY set; firewall this port to the proxy
      # host. If nginx instead sends /api to :6801, you can remove this line.
      - "6800:6800"
    # Let the container reach services running on the HOST (e.g. a host-run
    # LiteLLM :5000, local TTS :6767, or any other localhost service) via the
    # hostname `host.docker.internal`. On Linux this mapping isn't built in, so
    # point it at the docker bridge gateway explicitly. Use it in .env values
    # like LLM_BASE_URL=http://host.docker.internal:5000. (Sibling services in
    # this compose — postgres, lightpanda — are reached by their service name.)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      # Reach the sibling browser service (overrides the .env / default).
      LIGHTPANDA_WS: "ws://lightpanda:9222"
      # ── Database ──────────────────────────────────────────────────────
      # DEFAULT: PostgreSQL (the `postgres` service below). DATABASE_URL selects
      # the pg driver automatically (see agent-backend/db/adapter.js). To fall
      # back to the bundled SQLite instead, comment DATABASE_URL out (or set
      # ORBIT_DB_DRIVER=sqlite) — ORBIT_DB_PATH then persists it on the volume.
      DATABASE_URL: "postgres://orbit:orbit@postgres:5432/orbit"
      ORBIT_DB_PATH: "/data/orbit.db"
      ORBIT_HOME: "/data/orbit-home"
      # pi (@earendil-works/pi-coding-agent) is baked into the image and on PATH,
      # so no PI_CLI_PATH / host mount is needed. PORT/HOST are forced per-process
      # by the entrypoint (backend :6800, dashboard :6801) — don't set them here.
    volumes:
      - orbit-data:/data
    depends_on:
      lightpanda:
        condition: service_started
      postgres:
        condition: service_healthy

  lightpanda:
    image: lightpanda/browser:nightly
    restart: unless-stopped
    expose:
      - "9222"                 # internal only; orbit connects via LIGHTPANDA_WS

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      # Match the credentials in the orbit service's DATABASE_URL above. Override
      # all three via .env for a real deployment (and change the password!).
      POSTGRES_USER: "${POSTGRES_USER:-orbit}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-orbit}"
      POSTGRES_DB: "${POSTGRES_DB:-orbit}"
    volumes:
      - orbit-pgdata:/var/lib/postgresql/data
    # Gates the orbit service's `depends_on: condition: service_healthy` so the
    # app never boots before the DB is accepting connections.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orbit} -d ${POSTGRES_DB:-orbit}"]
      interval: 5s
      timeout: 5s
      retries: 10
    expose:
      - "5432"                 # internal only; orbit connects via DATABASE_URL

volumes:
  orbit-data:
  orbit-pgdata:
